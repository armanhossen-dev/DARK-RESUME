<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume — Arman Hossen Ripon</title>
<link rel="icon" href="img/fav.png" type="image/x-icon" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0a0a0a;
    --surface:   #111111;
    --surface2:  #181818;
    --border:    rgba(255,255,255,0.07);
    --green:     #a8ff60;
    --green-dim: rgba(168,255,96,0.10);
    --green-hi:  rgba(168,255,96,0.20);
    --white:     #f0f0f0;
    --muted:     #dddddd;
    --muted2:    #e9e9e9;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }

  body {
    background: var(--bg);
    color: var(--white);
    font-family: 'JetBrains Mono', monospace;
    display: flex;
    flex-direction: column;
    user-select: none;
  }

  /* grain overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.3;
  }

  /* ── TOPBAR ── */
  .topbar {
    height: 52px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    flex-shrink: 0;
    gap: 12px;
    position: relative;
    z-index: 10;
  }

  .tb-left {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .tb-logo {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 800;
    color: var(--green);
    letter-spacing: -0.02em;
  }
  a.tb-logo-link {
    text-decoration: none;
  }

  .tb-sep {
    width: 1px;
    height: 18px;
    background: var(--border);
    flex-shrink: 0;
  }

  .tb-label {
    font-size: 10px;
    color: var(--muted2);
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }

  /* ── CONTROLS ── */
  .controls {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    height: 30px;
    min-width: 30px;
    padding: 0 10px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    letter-spacing: 0.05em;
    transition: all 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .btn:hover {
    border-color: var(--green);
    color: var(--green);
    background: var(--green-dim);
  }

  .btn:active { transform: scale(0.92); }

  .btn.accent {
    border-color: var(--green);
    color: var(--green);
    background: var(--green-dim);
  }

  .btn.accent:hover { background: var(--green-hi); }

  .zoom-val {
    font-size: 11px;
    color: var(--white);
    min-width: 40px;
    text-align: center;
    letter-spacing: 0.04em;
  }

  .v-sep {
    width: 1px;
    height: 18px;
    background: var(--border);
    margin: 0 4px;
    flex-shrink: 0;
  }

  /* ── THEME TOGGLE ── */
  .theme-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .tg-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    min-width: 32px;
    text-align: right;
  }

  .switch {
    position: relative;
    width: 34px;
    height: 18px;
    display: inline-block;
    flex-shrink: 0;
  }

  .switch input { opacity: 0; width: 0; height: 0; }

  .slider {
    position: absolute;
    inset: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 18px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .slider::before {
    content: '';
    position: absolute;
    width: 11px;
    height: 11px;
    left: 3px;
    top: 50%;
    transform: translateY(-50%);
    background: var(--muted2);
    border-radius: 50%;
    transition: all 0.2s;
  }

  input:checked + .slider {
    background: var(--green-dim);
    border-color: var(--green);
  }

  input:checked + .slider::before {
    background: var(--green);
    left: 18px;
  }

  /* ── VIEWER ── */
  .viewer {
    flex: 1;
    overflow: auto;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 24px;
    background: var(--bg);
    background-size: auto, auto, 28px 28px, 28px 28px;
    position: relative;
  }

  /* A4 */
  .a4-wrap {
    transform-origin: top center;
    transition: transform 0.18s cubic-bezier(0.4,0,0.2,1);
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }

  .a4-wrap::before {
    content: 'A4  ·  794 × 1123';
    position: absolute;
    top: -20px;
    left: 0;
    font-size: 9px;
    letter-spacing: 0.16em;
    color: var(--muted2);
    text-transform: uppercase;
  }

  .a4-shadow {
    width: 794px;
    height: 1123px;
    border-radius: 2px;
    overflow: hidden;
    position: relative;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.06),
      0 10px 20px rgba(0,0,0,0.55),
      0 10px 20px rgba(0,0,0,0.70),
      0 0 20px rgba(168,255,96,0.035);
  }

  #resumeImg {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
    -webkit-user-select: none;
    user-select: none;
    -webkit-user-drag: none;
    pointer-events: none;
  }

  /* blocks right-click / drag */
  .img-guard {
    position: absolute;
    inset: 0;
    z-index: 2;
    cursor: default;
  }

  /* ── STATUSBAR ── */
  .statusbar {
    height: 30px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 24px;
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }

  .sb-item {
    font-size: 10px;
    color: var(--muted2);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 7px;
    white-space: nowrap;
  }

  .sb-item .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--green);
    flex-shrink: 0;
  }

  .sb-item.push { margin-left: auto; }

  /* ── HINT TOAST ── */
  .hint {
    position: fixed;
    bottom: 46px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.08em;
    pointer-events: none;
    white-space: nowrap;
    z-index: 100;
    animation: hintIn 0.4s ease 0.6s both;
  }

  @keyframes hintIn {
    from { opacity: 0; transform: translateX(-50%) translateY(6px); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  /* scrollbar */
  .viewer::-webkit-scrollbar { width: 5px; height: 5px; }
  .viewer::-webkit-scrollbar-track { background: transparent; }
  .viewer::-webkit-scrollbar-thumb { background: #1e1e1e; border-radius: 3px; }
  .viewer::-webkit-scrollbar-thumb:hover { background: #2a2a2a; }

  @media (max-width: 640px) {
    .tb-label { display: none; }
    .topbar, .statusbar { padding: 0 14px; }
    .viewer { padding: 24px 12px; }
    .hint { display: none; }
    .sb-item:not(.push):nth-child(n+2) { display: none; }
  }
</style>
</head>
<body oncontextmenu="return false;">

<!-- TOPBAR -->
<div class="topbar">
  <div class="tb-left">
    <a class="tb-logo-link" href="https://armanhossenripon.vercel.app/#resume">
      <span class="tb-logo">AHRN</span>
    </a>
    <div class="tb-sep"></div>
    <span class="tb-label">Resume · A4</span>
  </div>

  <div class="controls">
    <button class="btn" id="zoomOut" title="Zoom out (−)">−</button>
    <span class="zoom-val" id="zoomLabel">100%</span>
    <button class="btn" id="zoomIn"  title="Zoom in (+)">+</button>
    <div class="v-sep"></div>
    <button class="btn" id="fitBtn"   title="Fit to window (F)">Fit</button>
    <button class="btn" id="resetBtn" title="Reset (0)">1:1</button>
    <div class="v-sep"></div>
    <div class="theme-toggle">
      <span class="tg-label" id="tgLabel">LIGHT</span>
      <label class="switch" title="Toggle resume theme">
        <input type="checkbox" id="themeSwitch">
        <span class="slider"></span>
      </label>
    </div>
  </div>
</div>

<!-- VIEWER -->
<div class="viewer" id="viewer">
  <div class="a4-wrap" id="a4wrap">
    <div class="a4-shadow">
      <!-- <img // for image only
        id="resumeImg"
        src="./img/white.png"
        alt="Arman Hossen Ripon — Resume"
        draggable="false"
      /> -->
      <!-- onlyl for pdf -->
      <!-- <iframe
        id="resumeImg"
        src="./img/white.pdf"
        title="Arman Hossen Ripon — Resume"
        style="width:100%;height:100%;border:none;display:block;"
      ></iframe> -->
      <canvas id="resumeImg" style="display:block;position:relative;z-index:0;"></canvas>
      <div id="linkLayer" style="position:absolute;inset:0;z-index:3;"></div>
      <div class="img-guard" oncontextmenu="return false;" style="z-index:4;pointer-events:none;"></div>
    </div>
  </div>
</div>

<!-- HINT -->
<div class="hint" id="hint">Ctrl + Scroll to zoom &nbsp;·&nbsp; + / − keys &nbsp;·&nbsp; F to fit</div>

<!-- STATUSBAR -->
<div class="statusbar">
  <div class="sb-item"><span class="dot"></span>Arman Hossen Ripon — Resume</div>
  <div class="sb-item">A4 · 794 × 1123 px</div>
  <div class="sb-item" id="sbZoom">Zoom · 100%</div>
  <div class="sb-item push">
    <button class="btn accent" id="dlBtn">↓ Download</button>
  </div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const wrap    = document.getElementById('a4wrap');
const viewer  = document.getElementById('viewer');
const label   = document.getElementById('zoomLabel');
const sbZoom  = document.getElementById('sbZoom');
const canvas  = document.getElementById('resumeImg');
const toggle  = document.getElementById('themeSwitch');
const tgLabel = document.getElementById('tgLabel');

const STEP = 0.1, MIN = 0.25, MAX = 3.0;
let zoom = 1.0;
let pdfDoc = null;
const SCALE = 2; // render at 2x for sharpness

const LIGHT_PDF = './img/white.pdf';
const DARK_PDF  = './img/black.pdf';

async function loadPDF(src) {
  pdfDoc = await pdfjsLib.getDocument(src).promise;
  renderPage();
}

async function renderPage() {
  const page = await pdfDoc.getPage(1);
  const viewport = page.getViewport({ scale: SCALE });
  canvas.width  = viewport.width;
  canvas.height = viewport.height;
  canvas.style.width  = '794px';
  canvas.style.height = '1123px';

  await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;

  // Build clickable link layer
  const linkLayer = document.getElementById('linkLayer');
  linkLayer.innerHTML = '';
  linkLayer.style.width  = '794px';
  linkLayer.style.height = '1123px';
  linkLayer.style.position = 'absolute';
  linkLayer.style.top  = '0';
  linkLayer.style.left = '0';

  const annotations = await page.getAnnotations();
  const displayViewport = page.getViewport({ scale: 1 }); // 1:1 for 794px display

  annotations.forEach(ann => {
    if (!ann.url && !ann.dest) return;

    const [x1, y1, x2, y2] = ann.rect;

    // PDF coords are bottom-left origin — flip Y
    const scaleX = 794 / displayViewport.width;
    const scaleY = 1123 / displayViewport.height;

    const left   = x1 * scaleX;
    const top    = (displayViewport.height - y2) * scaleY;
    const width  = (x2 - x1) * scaleX;
    const height = (y2 - y1) * scaleY;

    const a = document.createElement('a');
    a.href   = ann.url || '#';
    a.target = '_blank';
    a.rel    = 'noopener';
    a.style.cssText = `
      position: absolute;
      left: ${left}px;
      top: ${top}px;
      width: ${width}px;
      height: ${height}px;
      cursor: pointer;
      z-index: 3;
    `;

    // Block right-click on links too
    a.addEventListener('contextmenu', e => e.preventDefault());

    linkLayer.appendChild(a);
  });
}

function applyZoom(z) {
  zoom = Math.round(Math.min(MAX, Math.max(MIN, z)) * 100) / 100;
  wrap.style.transform = `scale(${zoom})`;
  const pct = Math.round(zoom * 100) + '%';
  label.textContent = pct;
  sbZoom.textContent = 'Zoom · ' + pct;
}

function fitToWindow() {
  applyZoom((viewer.clientWidth - 56) / 794);
}

document.getElementById('zoomIn').addEventListener('click',  () => applyZoom(zoom + STEP));
document.getElementById('zoomOut').addEventListener('click', () => applyZoom(zoom - STEP));
document.getElementById('resetBtn').addEventListener('click', () => applyZoom(1.0));
document.getElementById('fitBtn').addEventListener('click', fitToWindow);

viewer.addEventListener('wheel', e => {
  if (e.ctrlKey || e.metaKey) {
    e.preventDefault();
    applyZoom(zoom + (e.deltaY < 0 ? STEP : -STEP));
  }
}, { passive: false });

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === '+' || e.key === '=') applyZoom(zoom + STEP);
  if (e.key === '-' || e.key === '_') applyZoom(zoom - STEP);
  if (e.key === '0') applyZoom(1.0);
  if (e.key === 'f' || e.key === 'F') fitToWindow();
});

// Theme toggle
toggle.addEventListener('change', () => {
  loadPDF(toggle.checked ? DARK_PDF : LIGHT_PDF);
  tgLabel.textContent = toggle.checked ? 'Dark' : 'Light';
});

// Download current PDF
document.getElementById('dlBtn').addEventListener('click', () => {
  const a = document.createElement('a');
  a.href = toggle.checked ? DARK_PDF : LIGHT_PDF;
  a.download = 'Arman_Hossen_Ripon_Resume.pdf';
  a.click();
});

// Init
window.addEventListener('load', () => {
  loadPDF(LIGHT_PDF);
  if (viewer.clientWidth < 850) fitToWindow();
});

// Dismiss hint
setTimeout(() => {
  const h = document.getElementById('hint');
  if (!h) return;
  h.style.transition = 'opacity 0.5s';
  h.style.opacity = '0';
  setTimeout(() => h.remove(), 500);
}, 4500);
</script>
</body>
</html>
